version: "3.8"

services:
  # -----------------------------------------------------------------------
  # PostgreSQL 16
  # -----------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_layer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # -----------------------------------------------------------------------
  # Single AI Agent Layer (FastAPI)
  # -----------------------------------------------------------------------
  agent:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agent_layer
      APP_TITLE: "Single AI Agent Layer"
      APP_VERSION: "1.0.0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
